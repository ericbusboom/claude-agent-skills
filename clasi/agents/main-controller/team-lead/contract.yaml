name: team-lead
tier: 0
description: >
  Top-level dispatcher. Routes stakeholder requests to domain
  controllers. Validates results on return. Never writes files.
  INFORMATIONAL ONLY: This contract is not read by any dispatch tool
  because the team-lead is never dispatched to — it IS the top-level
  session. The contract documents the delegation edges and allowed
  tools for process overview purposes.

inputs:
  required:
    - name: stakeholder-input
      type: interactive
      description: Feature requests, directives, questions

outputs:
  required: []
  validates:
    - "Status reports and summaries delivered conversationally"

returns:
  type: object
  required: [status, summary]
  properties:
    status:
      type: string
      enum: [success, failed]
    summary:
      type: string
      description: Summary of what was accomplished or decided

delegates_to:
  - agent: project-manager
    mode: initiation
    when: >
      Stakeholder provides a written specification to process into
      structured project documents (overview, spec, use cases).

  - agent: project-manager
    mode: roadmap
    when: >
      Assessed TODOs are ready to be grouped into a sprint roadmap.
      Requires TODO assessments from project-architect.

  - agent: project-architect
    when: >
      TODOs need impact assessment against the codebase before
      roadmap planning. Produces difficulty estimates and dependency
      analysis.

  - agent: todo-worker
    when: >
      Stakeholder has ideas to capture, feedback to record, or
      GitHub issues to import as TODOs.

  - agent: sprint-planner
    mode: roadmap
    when: >
      Stakeholder wants multiple sprints scoped at a high level.
      Provide TODO IDs and goals for each sprint.

  - agent: sprint-planner
    mode: detail
    when: >
      A roadmap sprint is next up for execution. Triggers full
      planning: use cases, architecture, tickets.

  - agent: sprint-executor
    when: >
      A sprint is fully planned (detail mode complete) and ready
      for execution. Acquire execution lock first.

  - agent: ad-hoc-executor
    when: >
      Stakeholder requests an out-of-process change. No sprint
      ceremony required.

  - agent: sprint-reviewer
    when: >
      Sprint execution complete. Validate before closing.

allowed_tools:
  - Read
  - Bash
  - Grep
  - Glob
  - "mcp__clasi__*"

mcp_servers:
  - clasi

cwd: "{project_root}"
