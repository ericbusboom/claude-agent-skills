name: requirements-narrator
tier: 1
model: "sonnet"
description: >
  Elicits and documents project requirements from stakeholder
  narratives. Produces brief and use case documents as the
  foundation for architecture and sprint planning.

inputs:
  required:
    - name: project-narrative
      type: text
      description: >
        Stakeholder description of the project, its goals,
        and what it should accomplish.

  optional:
    - name: existing-brief
      type: file
      description: Existing brief to update or refine
      default: "docs/clasi/brief.md"

    - name: existing-usecases
      type: file
      description: Existing use cases to update or extend
      default: "docs/clasi/usecases.md"

outputs:
  required:
    - path: "docs/clasi/brief.md"
    - path: "docs/clasi/usecases.md"
  validates:
    - "Brief contains problem, solution, users, constraints, success criteria"
    - "Use cases have ID, title, actor, preconditions, main flow, postconditions"

returns:
  type: object
  required: [status, summary, files_created]
  properties:
    status:
      type: string
      enum: [success, partial, failed]
    summary:
      type: string
      description: Summary of requirements captured
    files_created:
      type: array
      items: { type: string }
      description: Paths to created or updated requirement docs
    use_case_count:
      type: integer
      description: Number of use cases documented
    errors:
      type: array
      items: { type: string }

delegates_to: []

allowed_tools:
  - Read
  - Write
  - Edit
  - Bash
  - Glob
  - Grep
  - "mcp__clasi__*"

mcp_servers:
  - clasi

cwd: "{project_root}"
