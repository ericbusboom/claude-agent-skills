# CLASI project settings
#
# Version format tokens:
#   X     — manual segment, exactly 1 digit
#   XX    — manual segment, exactly 2 digits
#   X+    — manual segment, one or more digits (variable width)
#   0XX   — manual segment, 2 digits, zero-padded
#   0XXX  — manual segment, 3 digits, zero-padded
#   YYYY  — four-digit year
#   MM    — two-digit month
#   DD    — two-digit day
#   R     — revision, exactly 1 digit
#   RR    — revision, exactly 2 digits
#   R+    — revision, one or more digits (variable width)
#   0RR   — revision, 2 digits, zero-padded
#   0RRR  — revision, 3 digits, zero-padded
#
# Dots are literal separators.
#
# Examples:
#   X+.YYYYMMDD.R+   — 0.20260319.1 (default)
#   X.X.X             — fully manual, single digits (0.0.0 to 9.9.9)
#   X+.X+.X+          — fully manual, variable width (semver-style)
#   0XX.YYYYMMDD.R+   — 01.20260319.1 (zero-padded 2-digit major)
#   X+.YYYYMMDD.0RRR  — 0.20260319.001 (zero-padded 3-digit revision)

version_format: "X+.YYYYMMDD.R+"

# When to update the version number:
#   manual       — never auto-update; developer manages version manually
#   every_sprint — update version when a sprint is closed
#   every_change — update version after any change (sprint close or
#                  out-of-process changes). This is the default.

version_trigger: "every_change"

# Primary version source file. This is where the version is read from
# and written to. Auto-detected if not set (checks pyproject.toml then
# package.json).
version_source: "pyproject.toml"

# Additional files to sync the version into after a bump. The version
# from the source file is copied into each of these. Useful for monorepos
# where multiple package.json or pyproject.toml files need the same version.
# version_sync: []
#   - "packages/server/package.json"
#   - "packages/client/package.json"
